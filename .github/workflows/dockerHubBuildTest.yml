# .github/workflows/deploy.yml
name: Build and Deploy

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签时触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Tag Name
        run: echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV  # 提取当前的 tag 名字，赋值给环境变量 IMAGE_TAG，但是不能跨越job传递。

      - uses: actions/checkout@v4

      - name: Login to Docker Hub  # 登录镜像服务器并推送镜像
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Image  # 构建镜像
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/test-ci-cd:${{ env.IMAGE_TAG }}

  deploy:
    needs: build-and-push   # 依赖上一个 job 成功
    runs-on: ubuntu-latest
    steps:
      - name: Extract Tag Name # 重新提取，确保这个job也可以获取到这个变量。
        run: echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: SSH to Server & Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/test-ci-cd:${{ env.IMAGE_TAG }}
            docker stop myapp || true
            docker rm myapp || true
            docker run -d --name myapp -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/test-ci-cd:${{ env.IMAGE_TAG }}
          # 如果是私有仓库pull取镜像需要先登录
          # 运行结束后可以删除镜像，节省空间
